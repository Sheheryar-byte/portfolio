{% extends "base.html" %}

{% block content %}
<!-- Reading Progress Bar -->
<div id="progress-container" class="fixed top-0 left-0 w-full h-1.5 z-50 bg-gray-200">
    <div id="progress-bar" class="h-full bg-brand-orange w-0 transition-all duration-100 ease-out"></div>
</div>

<section class="min-h-screen pt-32 pb-24 px-4 md:px-[100px] bg-white">
    <div class="max-w-[800px] mx-auto opacity-0 translate-y-4 animate-fade-in-up">
        <!-- Back Link -->
        <a href="/blog"
            class="inline-flex items-center gap-2 text-brand-orange font-bold mb-8 hover:-translate-x-1 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Blog
        </a>

        <!-- Header -->
        <div class="flex flex-col gap-6 mb-12">
            <span class="text-brand-orange font-bold tracking-widest uppercase text-sm md:text-base">{{ post.category
                }}</span>
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-brand-dark leading-[1.2] tracking-tight">{{
                post.title }}</h1>
            <div class="flex items-center gap-4 text-brand-gray-400 font-medium">
                <span>{{ post.date }}</span>
                <span class="w-1 h-1 rounded-full bg-brand-gray-300"></span>
                <span>5 min read</span>
            </div>
        </div>

        <!-- Featured Image -->
        {% if post.image %}
        <div
            class="w-full aspect-video rounded-[30px] md:rounded-[40px] overflow-hidden mb-16 shadow-2xl relative group">
            <img src="{{ post.image }}" alt="{{ post.title }}"
                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-brand-dark/10 group-hover:bg-brand-dark/0 transition-colors"></div>
        </div>
        {% endif %}

        <!-- Content -->
        <article class="prose prose-lg md:prose-xl max-w-none 
            prose-headings:text-brand-dark prose-headings:font-bold prose-headings:tracking-tight
            prose-p:text-brand-gray-500 prose-p:leading-loose
            prose-a:text-brand-orange prose-a:font-bold prose-a:no-underline hover:prose-a:underline
            prose-strong:text-brand-dark prose-strong:font-bold
            prose-code:text-brand-orange prose-code:bg-brand-orange/10 prose-code:px-2 prose-code:py-1 prose-code:rounded-lg prose-code:before:content-none prose-code:after:content-none
            prose-ul:marker:text-brand-orange prose-ol:marker:text-brand-orange
            prose-img:rounded-[20px] prose-img:shadow-lg">
            {{ post.content|safe }}
        </article>

        <!-- Share Section -->
        <div class="mt-20 pt-10 border-t border-gray-100 flex flex-col md:flex-row items-center justify-between gap-6">
            <span class="font-bold text-brand-dark text-lg">Share this article</span>
            <div class="flex gap-4">
                <!-- X (Twitter) Share -->
                <a href="https://twitter.com/intent/tweet?text={{ post.title|urlencode }}&url={{ request.url|urlencode }}"
                    target="_blank" rel="noopener noreferrer"
                    class="w-10 h-10 rounded-full bg-brand-gray-50 flex items-center justify-center text-brand-dark hover:bg-black hover:text-white transition-all">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932 6.064-6.933zm-1.292 19.49h2.039L6.486 3.24H4.298l13.311 17.403z" />
                    </svg>
                </a>
                <!-- LinkedIn Share -->
                <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ request.url|urlencode }}"
                    target="_blank" rel="noopener noreferrer"
                    class="w-10 h-10 rounded-full bg-brand-gray-50 flex items-center justify-center text-brand-dark hover:bg-[#0077b5] hover:text-white transition-all">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                </a>
            </div>
        </div>
    </div>
</section>

<script>
    // Progress Bar Script
    window.onscroll = function () {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("progress-bar").style.width = scrolled + "%";
    };

    // Fade In Animation Class (Add to CSS or use Tailwind config if possible)
    // Since we can't easily modify config, we'll inline a style for the specific animation
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
    `;
    document.head.appendChild(style);
</script>
{% endblock %}
